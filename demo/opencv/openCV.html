<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Hello OpenCV.js</title>
    <script src="./opencv_4.11.0.js" type="text/javascript"></script>
  </head>
  <body>
    <h2>Hello OpenCV.js</h2>
    <p id="status">OpenCV.js 正在加载...</p>
    <div>
      <div class="inputoutput">
        <img id="imageSrc" alt="无图像" />
        <div class="caption">imageSrc <input type="file" id="fileInput" name="file" /></div>
        <canvas id="canvasInput" width="400" height="400"></canvas>
      </div>
      <div class="inputoutput">
        <canvas id="canvasOutput"></canvas>
        <div class="caption">canvasOutput</div>
      </div>
    </div>
    <script type="text/javascript">
      let imgElement = document.getElementById('imageSrc');
      let inputElement = document.getElementById('fileInput');
      inputElement.addEventListener(
        'change',
        e => {
          imgElement.src = URL.createObjectURL(e.target.files[0]);
        },
        false,
      );

      imgElement.onload = function () {
        // 把图片写入canvasInput
        let canvasInput = document.getElementById('canvasInput');
        let ctx = canvasInput.getContext('2d');
        ctx.drawImage(imgElement, 0, 0, canvasInput.width, canvasInput.height);

        cv.then(cv => {
          let src = cv.imread('canvasInput');
          // let src = cv.imread(imgElement);
          //cv.resize(src, src, new cv.Size(1024, 1024));
          cv.imshow('canvasOutput', src);

          let tool = new cv.segmentation_IntelligentScissorsMB();
          tool.setEdgeFeatureCannyParameters(32, 100);
          tool.setGradientMagnitudeMaxLimit(200);
          tool.applyImage(src);

          let hasMap = false;

          let canvas = document.getElementById('canvasOutput');
          canvas.addEventListener('click', e => {
            let startX = e.offsetX,
              startY = e.offsetY;
            console.log(startX, startY);
            if (startX < src.cols && startY < src.rows) {
              console.time('buildMap');
              tool.buildMap(new cv.Point(startX, startY));
              console.timeEnd('buildMap');
              hasMap = true;
            }
          });
          canvas.addEventListener('mousemove', e => {
            let x = e.offsetX,
              y = e.offsetY; //console.log(x, y);
            let dst = src.clone();
            if (hasMap && x >= 0 && x < src.cols && y >= 0 && y < src.rows) {
              let contour = new cv.Mat();
              tool.getContour(new cv.Point(x, y), contour);
              let contours = new cv.MatVector();
              contours.push_back(contour);
              let color = new cv.Scalar(0, 255, 0, 255); // RGBA
              cv.polylines(dst, contours, false, color, 1, cv.LINE_8);
              contours.delete();
              contour.delete();
            }
            cv.imshow('canvasOutput', dst);
            dst.delete();
          });
          canvas.addEventListener('dispose', e => {
            src.delete();
            tool.delete();
          });
        });

        // let mat = cv.imread(imgElement);
        // cv.imshow('canvasOutput', mat);
        // mat.delete();
      };

      var Module = {
        // https://emscripten.cn/docs/api_reference/module.html#Module.onRuntimeInitialized
        onRuntimeInitialized() {
          document.getElementById('status').innerHTML = 'OpenCV.js 已准备好。';
        },
      };
    </script>
  </body>
</html>
